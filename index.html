<title>PokéMath Challenge - P3</title>
<style>
    body {font-family: Arial, sans-serif; background-color: #000000; color: #ffffff; margin:0; padding:0; text-align:center;}
    .container {max-width:900px; margin:0 auto; background:#1a1a1a; min-height:100vh;}
    header {background:linear-gradient(to right,#ff00aa,#00aaff); padding:15px; font-size:28px; font-weight:bold; position:relative;}
    .profile-btn {position:absolute; top:15px; right:20px; background:#ffd700; color:#000; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold;}
    .screen {padding:30px;}
    button {background:#00ffcc; color:#000; border:none; padding:14px 30px; margin:10px; border-radius:8px; font-size:18px; font-weight:bold; cursor:pointer; transition:all 0.1s;}
    button:active {transform:scale(0.92); background:#00ccaa;}
    button:hover {background:#00ccaa; transform:scale(1.05);}
    input[type="text"], input[type="number"] {background:#333; color:#fff; border:2px solid #00ffcc; padding:12px; font-size:20px; border-radius:8px; width:320px; text-align:center;}
    .pokemon-grid img {width:130px; margin:15px; cursor:pointer; border:4px solid #333; border-radius:15px; transition:0.3s;}
    .pokemon-grid img.selected {border-color:#00ffcc; transform:scale(1.12);}
    .question {font-size:34px; background:#222; padding:30px; border-radius:15px; margin:25px 0; min-height:90px; border:2px solid #00ffcc;}
    .timer {font-size:36px; color:#ff0066; font-weight:bold; margin:15px 0;}
    .card {background:linear-gradient(145deg,#222,#444); border:3px solid #ffd700; border-radius:15px; padding:12px; margin:12px; display:inline-block; width:200px; box-shadow:0 5px 15px rgba(255,215,0,0.3);}
    .card img {width:100%; border-radius:8px;}
</style>
</head>
<body>

<div class="container">
    <header>
        🎮 POKÉMATH CHALLENGE 🎮
        <div class="profile-btn" onclick="showProfile()">👤 Profile</div>
    </header>

    <div id="screen1" class="screen">
        <h2>P3 Math Adventure</h2>
        <p><strong>Trainer Name:</strong></p>
        <input type="text" id="playerName" placeholder="Enter your name">
        <p><strong>Choose Your Pokémon Partner:</strong></p>
        <div class="pokemon-grid" id="charSelect"></div>
        <button onclick="goToTopic()">Continue →</button>
    </div>

    <div id="screen2" class="screen" style="display:none;">
        <h1>Hello, <span id="displayName"></span>!</h1>
        <p>Partner: <span id="displayChar"></span></p>
        <h2>Select Topic</h2>
        <button onclick="setTopic('add')">➕ Addition</button>
        <button onclick="setTopic('sub')">➖ Subtraction</button>
        <button onclick="setTopic('mul')">✖ Multiplication</button>
        <button onclick="setTopic('div')">➗ Division</button>
        <h2>Select Difficulty</h2>
        <button onclick="startRound(1)">Easy</button>
        <button onclick="startRound(2)">Medium</button>
        <button onclick="startRound(3)">Hard</button>
        <button onclick="startRound(4)">Very Hard</button>
    </div>

    <div id="gameScreen" class="screen" style="display:none;">
        <div class="timer">⏰ Time Left: <span id="timeLeft">120</span>s</div>
        <h2 id="topicLevel"></h2>
        <div class="question" id="questionArea"></div>
        <input type="number" id="userAnswer" placeholder="Your Answer" autofocus>
        <br><br>
        <button onclick="submitAnswer()">Submit Answer</button>
        <p>Question <span id="progress">1</span>/5 | Correct: <span id="correct">0</span></p>
    </div>

    <div id="resultScreen" class="screen" style="display:none;">
        <h1 id="resultTitle"></h1>
        <p id="resultMsg"></p>
        <div id="rewardArea"></div>
        <button onclick="showProfile()">📦 View Card Box</button>
        <button onclick="backToMenu()">Play Again</button>
    </div>

    <div id="profileScreen" class="screen" style="display:none;">
        <h1>👤 <span id="profileName"></span>'s Nihil Zero Collection</h1>
        <p>Total Cards: <span id="totalCards">0</span></p>
        <div id="cardsContainer"></div>
        <button onclick="backToMenu()">Back to Menu</button>
    </div>
</div>

    {id:"111/NZ",name:"Corsola",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/222.png",price:7.40,rarity:"Rare"},
    {id:"112/NZ",name:"Remoraid",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/223.png",price:4.20,rarity:"Common"},
    {id:"113/NZ",name:"Octillery",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/224.png",price:8.60,rarity:"Uncommon"},
    {id:"114/NZ",name:"Delibird",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/225.png",price:6.90,rarity:"Rare"},
    {id:"115/NZ",name:"Mantine",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/226.png",price:10.50,rarity:"Rare"},
    {id:"116/NZ",name:"Skarmory",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/227.png",price:12.80,rarity:"Rare"},
    {id:"117/NZ",name:"Houndour",img:"https://assets.pokemon.com/assets/cms2/img/pokedex/full/228.png",price:5.30,rarity:"Common"}
];

let currentTopic = "";
let currentLevel = 1;
let qAnswered = 0;
let correctCount = 0;
let timeLeft = 120;
let timer;
let currentAnswer;

// The rest of the functions (renderCharacters, selectPokemon, goToTopic, setTopic, startRound, etc.) are the same as the previous version.

function renderCharacters() {
    const container = document.getElementById("charSelect");
    container.innerHTML = "";
    pokemons.forEach((p, i) => {
        const img = document.createElement("img");
        img.src = p.img;
        img.onclick = () => selectPokemon(i, img);
        container.appendChild(img);
    });
}

let selectedIndex = -1;
function selectPokemon(i, element) {
    document.querySelectorAll("#charSelect img").forEach(el => el.classList.remove("selected"));
    element.classList.add("selected");
    selectedIndex = i;
}

function goToTopic() {
    const name = document.getElementById("playerName").value.trim();
    if (!name) return alert("Please enter your name!");
    if (selectedIndex === -1) return alert("Please choose a Pokémon!");

    player.name = name;
    player.character = pokemons[selectedIndex];

    document.getElementById("screen1").style.display = "none";
    document.getElementById("screen2").style.display = "block";
    document.getElementById("displayName").textContent = name;
    document.getElementById("displayChar").innerHTML = `${player.character.name} <img src="${player.character.img}" width="60">`;
}

function setTopic(topic) { currentTopic = topic; }

function startRound(level) {
    if (!currentTopic) return alert("Please choose a topic first!");
    currentLevel = level;
    qAnswered = 0;
    correctCount = 0;
    timeLeft = 120;

    document.getElementById("screen2").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    document.getElementById("topicLevel").innerHTML = `${currentTopic.toUpperCase()} — ${["Easy","Medium","Hard","Very Hard"][level-1]}`;

    startTimer();
    nextQuestion();
}

function startTimer() {
    clearInterval(timer);
    document.getElementById("timeLeft").textContent = timeLeft;
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timeLeft").textContent = timeLeft;
        if (timeLeft <= 0) endRound();
    }, 1000);
}

function generateQuestion() {
    let a, b, ans;
    const lvl = currentLevel;

    switch(currentTopic) {
        case "add":
            if (lvl === 1) { a = Math.floor(Math.random()*20)+1; b = Math.floor(Math.random()*20)+1; }
            else if (lvl === 2) { a = Math.floor(Math.random()*50)+1; b = Math.floor(Math.random()*50)+1; }
            else if (lvl === 3) { a = Math.floor(Math.random()*100)+1; b = Math.floor(Math.random()*100)+1; }
            else { a = Math.floor(Math.random()*200)+1; b = Math.floor(Math.random()*200)+1; }
            ans = a + b;
            return {q: `${a} + ${b} = ?`, ans};
        case "sub":
            if (lvl === 1) { a = Math.floor(Math.random()*16)+5; b = Math.floor(Math.random()*(a-1))+1; }
            else if (lvl === 2) { a = Math.floor(Math.random()*41)+10; b = Math.floor(Math.random()*(a-1))+1; }
            else if (lvl === 3) { a = Math.floor(Math.random()*81)+20; b = Math.floor(Math.random()*(a-1))+1; }
            else { a = Math.floor(Math.random()*151)+50; b = Math.floor(Math.random()*(a-1))+1; }
            ans = a - b;
            return {q: `${a} - ${b} = ?`, ans};
        case "mul":
            if (lvl === 1) { a = Math.floor(Math.random()*10)+1; b = Math.floor(Math.random()*10)+1; }
            else if (lvl === 2) { a = Math.floor(Math.random()*12)+1; b = Math.floor(Math.random()*12)+1; }
            else if (lvl === 3) { a = Math.floor(Math.random()*15)+1; b = Math.floor(Math.random()*12)+1; }
            else { a = Math.floor(Math.random()*20)+1; b = Math.floor(Math.random()*15)+1; }
            ans = a * b;
            return {q: `${a} × ${b} = ?`, ans};
        case "div":
            if (lvl === 1) { b = Math.floor(Math.random()*10)+1; ans = Math.floor(Math.random()*10)+1; }
            else if (lvl === 2) { b = Math.floor(Math.random()*12)+1; ans = Math.floor(Math.random()*12)+1; }
            else if (lvl === 3) { b = Math.floor(Math.random()*15)+1; ans = Math.floor(Math.random()*20)+1; }
            else { b = Math.floor(Math.random()*20)+1; ans = Math.floor(Math.random()*25)+1; }
            a = b * ans;
            return {q: `${a} ÷ ${b} = ?`, ans};
    }
}

function nextQuestion() {
    if (qAnswered >= 5) { endRound(); return; }
    const q = generateQuestion();
    currentAnswer = q.ans;

    document.getElementById("questionArea").textContent = q.q;
    document.getElementById("userAnswer").value = "";
    document.getElementById("progress").textContent = qAnswered + 1;
    document.getElementById("correct").textContent = correctCount;
}

function submitAnswer() {
    const input = parseInt(document.getElementById("userAnswer").value);
    if (isNaN(input)) return alert("Please enter a number!");

    qAnswered++;
    if (input === currentAnswer) correctCount++;

    nextQuestion();
}

function endRound() {
    clearInterval(timer);
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("resultScreen").style.display = "block";

    if (correctCount === 5) {
        const wonCard = nihilZeroCards[Math.floor(Math.random() * nihilZeroCards.length)];
        player.cards.push(wonCard);

        document.getElementById("resultTitle").innerHTML = "🎉 PERFECT! 5/5 Correct!";
        document.getElementById("rewardArea").innerHTML = `
            <div class="card">
                <img src="${wonCard.img}" alt="${wonCard.name}">
                <h3>${wonCard.name}</h3>
                <p>${wonCard.id} • $${wonCard.price.toFixed(2)} • ${wonCard.rarity}</p>
            </div>`;
    } else {
        document.getElementById("resultTitle").innerHTML = "Round Finished";
        document.getElementById("resultMsg").innerHTML = `You got <strong>${correctCount}</strong>/5 correct.<br>Get all 5 correct to earn a card!`;
    }
}

function showProfile() {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById("profileScreen").style.display = "block";

    document.getElementById("profileName").textContent = player.name || "Trainer";
    document.getElementById("totalCards").textContent = player.cards.length;

    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    if (player.cards.length === 0) {
        container.innerHTML = "<p style='color:#888;'>No cards yet. Get 5/5 correct!</p>";
        return;
    }

    player.cards.forEach(card => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${card.img}" alt="${card.name}">
            <h3>${card.name}</h3>
            <p>${card.id} • $${card.price.toFixed(2)} • ${card.rarity}</p>
        `;
        container.appendChild(div);
    });
}

function backToMenu() {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById("screen2").style.display = "block";
}

// Initialize
renderCharacters();
</script>
</body>
</html>
